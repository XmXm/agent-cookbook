<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" width="1000" height="640">
  <!-- Light (default) theme: blends into 飞书's light-background docs. White canvas, tinted boxes, dark text. -->
  <rect x="0" y="0" width="1000" height="640" fill="#ffffff"/>

  <!-- Header. Title #0f172a for strong contrast on light canvas. -->
  <text x="500" y="44" fill="#0f172a" font-size="24" font-weight="700" text-anchor="middle">[图表标题] / Architecture</text>
  <text x="500" y="68" fill="#64748b" font-size="12" text-anchor="middle">[副标题 · subtitle]</text>

  <!-- Connectors: draw BEFORE boxes, orthogonal <polyline> + <polygon> arrowhead (NO <marker>). -->
  <polyline points="500,176 500,224" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="494,220 506,220 500,232" fill="#94a3b8"/>
  <polyline points="500,360 500,408" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="494,404 506,404 500,416" fill="#94a3b8"/>

  <!-- Layer 1: Frontend (cyan) -->
  <rect x="300" y="112" width="400" height="64" rx="6" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
  <text x="500" y="142" fill="#0f172a" font-size="14" font-weight="600" text-anchor="middle">[前端 / Frontend]</text>
  <text x="500" y="162" fill="#64748b" font-size="11" text-anchor="middle">[Web · iOS · Android]</text>

  <!-- Message bus (orange) sitting in the gap between layers -->
  <rect x="380" y="186" width="240" height="20" rx="4" fill="#fff7ed" stroke="#ea580c" stroke-width="1"/>
  <text x="500" y="200" fill="#c2410c" font-size="9" font-weight="600" text-anchor="middle">Message Bus · Kafka / RabbitMQ</text>

  <!-- Layer 2: Backend (emerald) with two sub-frames -->
  <rect x="300" y="248" width="400" height="112" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="500" y="276" fill="#0f172a" font-size="14" font-weight="600" text-anchor="middle">[服务层 / Services]</text>
  <rect x="324" y="292" width="166" height="52" rx="5" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="407" y="322" fill="#0f172a" font-size="12" text-anchor="middle">[核心服务]</text>
  <rect x="510" y="292" width="166" height="52" rx="5" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="593" y="322" fill="#0f172a" font-size="12" text-anchor="middle">[支撑服务]</text>

  <!-- Security group: dashed rose boundary, faint tint fill (stroke-dasharray IS supported) -->
  <rect x="288" y="396" width="424" height="96" rx="12" fill="#fef2f4" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="300" y="414" fill="#e11d48" font-size="10" font-weight="600">VPC / 安全边界</text>

  <!-- Layer 3: Database (violet) -->
  <rect x="300" y="424" width="400" height="56" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="500" y="450" fill="#0f172a" font-size="14" font-weight="600" text-anchor="middle">[存储层 / Storage]</text>
  <text x="500" y="468" fill="#64748b" font-size="11" text-anchor="middle">[MySQL · Redis · S3]</text>

  <!-- Legend OUTSIDE all boundaries -->
  <rect x="300" y="520" width="14" height="14" rx="3" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
  <text x="322" y="532" fill="#475569" font-size="11">前端</text>
  <rect x="380" y="520" width="14" height="14" rx="3" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="402" y="532" fill="#475569" font-size="11">后端</text>
  <rect x="460" y="520" width="14" height="14" rx="3" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="482" y="532" fill="#475569" font-size="11">存储</text>
  <rect x="540" y="520" width="14" height="14" rx="3" fill="#fef2f4" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="562" y="532" fill="#475569" font-size="11">安全组</text>
</svg>
