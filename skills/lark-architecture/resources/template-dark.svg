<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" width="1000" height="640">
  <!-- 画板-safe background: a single solid dark rect. NO <pattern> grid (unsupported by 画板). -->
  <rect x="0" y="0" width="1000" height="640" fill="#020617"/>

  <!-- Header. Primary/title text uses #ffffff: on 飞书's renderer dimmer near-whites (#e2e8f0) lose contrast. -->
  <text x="500" y="44" fill="#ffffff" font-size="24" font-weight="700" text-anchor="middle">[图表标题] / Architecture</text>
  <text x="500" y="68" fill="#94a3b8" font-size="12" text-anchor="middle">[副标题 · subtitle]</text>

  <!-- Connectors: draw BEFORE boxes, orthogonal <polyline> + <polygon> arrowhead (NO <marker>). -->
  <polyline points="500,176 500,224" fill="none" stroke="#64748b" stroke-width="2"/>
  <polygon points="494,220 506,220 500,232" fill="#64748b"/>
  <polyline points="500,360 500,408" fill="none" stroke="#64748b" stroke-width="2"/>
  <polygon points="494,404 506,404 500,416" fill="#64748b"/>

  <!-- Layer 1: Frontend (cyan) -->
  <rect x="300" y="112" width="400" height="64" rx="6" fill="rgba(8,51,68,0.55)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="500" y="142" fill="#ffffff" font-size="14" font-weight="600" text-anchor="middle">[前端 / Frontend]</text>
  <text x="500" y="162" fill="#94a3b8" font-size="11" text-anchor="middle">[Web · iOS · Android]</text>

  <!-- Message bus (orange) sitting in the gap between layers -->
  <rect x="380" y="186" width="240" height="20" rx="4" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1"/>
  <text x="500" y="200" fill="#fb923c" font-size="9" text-anchor="middle">Message Bus · Kafka / RabbitMQ</text>

  <!-- Layer 2: Backend (emerald) with two sub-frames -->
  <rect x="300" y="248" width="400" height="112" rx="6" fill="rgba(6,78,59,0.55)" stroke="#34d399" stroke-width="1.5"/>
  <text x="500" y="276" fill="#ffffff" font-size="14" font-weight="600" text-anchor="middle">[服务层 / Services]</text>
  <rect x="324" y="292" width="166" height="52" rx="5" fill="rgba(15,23,42,0.6)" stroke="#34d399" stroke-width="1"/>
  <text x="407" y="322" fill="#e2e8f0" font-size="12" text-anchor="middle">[核心服务]</text>
  <rect x="510" y="292" width="166" height="52" rx="5" fill="rgba(15,23,42,0.6)" stroke="#34d399" stroke-width="1"/>
  <text x="593" y="322" fill="#e2e8f0" font-size="12" text-anchor="middle">[支撑服务]</text>

  <!-- Security group: dashed rose boundary (stroke-dasharray IS supported on shapes) -->
  <rect x="288" y="396" width="424" height="96" rx="12" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="300" y="414" fill="#fb7185" font-size="10">VPC / 安全边界</text>

  <!-- Layer 3: Database (violet) -->
  <rect x="300" y="424" width="400" height="56" rx="6" fill="rgba(76,29,149,0.55)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="500" y="450" fill="#ffffff" font-size="14" font-weight="600" text-anchor="middle">[存储层 / Storage]</text>
  <text x="500" y="468" fill="#94a3b8" font-size="11" text-anchor="middle">[MySQL · Redis · S3]</text>

  <!-- Legend OUTSIDE all boundaries -->
  <rect x="300" y="520" width="14" height="14" rx="3" fill="rgba(8,51,68,0.55)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="322" y="532" fill="#94a3b8" font-size="11">前端</text>
  <rect x="380" y="520" width="14" height="14" rx="3" fill="rgba(6,78,59,0.55)" stroke="#34d399" stroke-width="1.5"/>
  <text x="402" y="532" fill="#94a3b8" font-size="11">后端</text>
  <rect x="460" y="520" width="14" height="14" rx="3" fill="rgba(76,29,149,0.55)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="482" y="532" fill="#94a3b8" font-size="11">存储</text>
  <rect x="540" y="520" width="14" height="14" rx="3" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="562" y="532" fill="#94a3b8" font-size="11">安全组</text>
</svg>
